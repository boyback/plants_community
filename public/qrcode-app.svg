<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 占位二维码:7x7 网格随机黑块,中心 logo  -->
  <rect width="200" height="200" fill="#ffffff"/>

  <!-- 三个角的定位标记 -->
  <g fill="#1f4130">
    <!-- 左上 -->
    <rect x="10" y="10" width="40" height="40"/>
    <rect x="16" y="16" width="28" height="28" fill="#fff"/>
    <rect x="22" y="22" width="16" height="16"/>
    <!-- 右上 -->
    <rect x="150" y="10" width="40" height="40"/>
    <rect x="156" y="16" width="28" height="28" fill="#fff"/>
    <rect x="162" y="22" width="16" height="16"/>
    <!-- 左下 -->
    <rect x="10" y="150" width="40" height="40"/>
    <rect x="16" y="156" width="28" height="28" fill="#fff"/>
    <rect x="22" y="162" width="16" height="16"/>
  </g>

  <!-- 模拟 QR 数据点 -->
  <g fill="#1f4130">
    <rect x="60" y="20" width="8" height="8"/>
    <rect x="78" y="20" width="8" height="8"/>
    <rect x="96" y="20" width="8" height="8"/>
    <rect x="120" y="20" width="8" height="8"/>
    <rect x="60" y="40" width="8" height="8"/>
    <rect x="105" y="40" width="8" height="8"/>
    <rect x="130" y="40" width="8" height="8"/>
    <rect x="60" y="60" width="8" height="8"/>
    <rect x="80" y="60" width="8" height="8"/>
    <rect x="100" y="60" width="8" height="8"/>
    <rect x="140" y="60" width="8" height="8"/>
    <rect x="170" y="60" width="8" height="8"/>
    <rect x="20" y="80" width="8" height="8"/>
    <rect x="40" y="80" width="8" height="8"/>
    <rect x="80" y="80" width="8" height="8"/>
    <rect x="120" y="80" width="8" height="8"/>
    <rect x="160" y="80" width="8" height="8"/>
    <rect x="40" y="100" width="8" height="8"/>
    <rect x="60" y="100" width="8" height="8"/>
    <rect x="105" y="100" width="8" height="8"/>
    <rect x="170" y="100" width="8" height="8"/>
    <rect x="20" y="120" width="8" height="8"/>
    <rect x="80" y="120" width="8" height="8"/>
    <rect x="140" y="120" width="8" height="8"/>
    <rect x="160" y="120" width="8" height="8"/>
    <rect x="60" y="140" width="8" height="8"/>
    <rect x="120" y="140" width="8" height="8"/>
    <rect x="170" y="140" width="8" height="8"/>
    <rect x="60" y="160" width="8" height="8"/>
    <rect x="100" y="160" width="8" height="8"/>
    <rect x="140" y="160" width="8" height="8"/>
    <rect x="80" y="180" width="8" height="8"/>
    <rect x="120" y="180" width="8" height="8"/>
    <rect x="160" y="180" width="8" height="8"/>
  </g>

  <!-- 中央 logo 圆形背景 -->
  <circle cx="100" cy="100" r="22" fill="#ffffff" stroke="#1f4130" stroke-width="2"/>
  <text x="100" y="111" font-size="22" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">🌱</text>
</svg>
