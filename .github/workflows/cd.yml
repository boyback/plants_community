name: CD

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像 tag(默认 latest)'
        required: false
        default: 'latest'

# 推送到 GitHub Container Registry(ghcr.io)
env:
  REGISTRY: ghcr.io
  NEXT_IMAGE: ${{ github.repository_owner }}/rouyou-next
  GO_IMAGE: ${{ github.repository_owner }}/rouyou-go

jobs:
  # =============================================================
  # 构建并推送两个镜像
  # =============================================================
  publish:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----- 计算 tag 列表 -----
      # main → latest, sha-XXXX
      # tag (vX.Y.Z) → vX.Y.Z, latest
      - name: Extract Next.js metadata
        id: meta_next
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NEXT_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push Next.js
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_next.outputs.tags }}
          labels: ${{ steps.meta_next.outputs.labels }}
          cache-from: type=gha,scope=next
          cache-to: type=gha,mode=max,scope=next

      - name: Extract Go metadata
        id: meta_go
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GO_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push Go
        uses: docker/build-push-action@v6
        with:
          context: ./server-go
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_go.outputs.tags }}
          labels: ${{ steps.meta_go.outputs.labels }}
          cache-from: type=gha,scope=go
          cache-to: type=gha,mode=max,scope=go

      - name: Image digests
        run: |
          echo "Next.js tags: ${{ steps.meta_next.outputs.tags }}"
          echo "Go tags:     ${{ steps.meta_go.outputs.tags }}"

  # =============================================================
  # 远端服务器部署(可选 — 配 SSH secret 才生效)
  # =============================================================
  deploy:
    name: Rolling Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # secrets 直接从仓库 Settings → Secrets 读
    steps:
      - uses: actions/checkout@v4

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # 工作目录:服务器上 git clone 这个仓库的位置
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin master
            git reset --hard origin/master
            export GHCR_OWNER=${{ github.repository_owner }}
            export TAG=latest
            chmod +x ./scripts/deploy.sh
            ./scripts/deploy.sh
