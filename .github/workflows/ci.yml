name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 同分支重复 push 时取消旧任务
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================
  # Next.js: TS 编译、build、单元测试
  # =============================================================
  next-check:
    name: Next.js Check
    runs-on: ubuntu-latest
    env:
      # build/check 阶段不真连 DB,占位即可(项目 page 都 force-dynamic 不会 SSR 查库)
      DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/placeholder"
      JWT_SECRET: ci-build-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --prefer-offline

      - name: Prisma generate
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: i18n integrity scan
        run: node scripts/i18n-scan.mjs --top 5

      - name: Next build
        run: npm run build

  # =============================================================
  # Go 后端: build + test
  # =============================================================
  go-check:
    name: Go Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server-go/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  # =============================================================
  # Prisma schema validate
  # =============================================================
  prisma-validate:
    name: Prisma Schema
    runs-on: ubuntu-latest
    env:
      # 仅做 schema 语法校验,不会真连库;Prisma 仍然要 url 参数才能 parse
      DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --no-audit --prefer-offline

      - name: Validate
        run: npx prisma validate

      - name: Format check
        run: npx prisma format --check

  # =============================================================
  # Docker build 演练(不 push,只确认 Dockerfile 可构建)
  # =============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [next-check, go-check]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Next image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rouyou-next:ci
          cache-from: type=gha,scope=next
          cache-to: type=gha,mode=max,scope=next

      - name: Build Go image
        uses: docker/build-push-action@v6
        with:
          context: ./server-go
          push: false
          tags: rouyou-go:ci
          cache-from: type=gha,scope=go
          cache-to: type=gha,mode=max,scope=go
