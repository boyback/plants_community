######################################################################
# 肉友社 / RouYou — nginx 反代(host network 模式 + HTTPS)
#
# nginx 容器走 host 网络,直接连宿主回环 127.0.0.1:3000(Next.js)
# 证书放在 /etc/nginx/certs/ (容器路径,host 上是 deploy/nginx/certs)
######################################################################

# HTTP -> HTTPS 强制跳转
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name plantcommunity.cn www.plantcommunity.cn _;

    # ACME http-01 challenge(将来用 certbot 续证时不被 301 拦截)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他全部 301 到 https
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name plantcommunity.cn www.plantcommunity.cn;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 现代 SSL 设置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS 半年(确认无问题再开 1 年)
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    client_max_body_size 20M;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;

    # SSE 长连接
    location /api/sse/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
