######################################################################
# 肉友社 / RouYou — nginx 反代
#
# 用 resolver + 变量延迟解析 upstream,避免依赖容器没起就启动失败。
######################################################################

# Docker 内置 DNS,所有 service name 走这里解析
resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name plantcommunity.cn www.plantcommunity.cn _;

    client_max_body_size 20M;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;

    # SSE:必须关 buffering + 长连接
    location /api/sse/ {
        # 走变量后,启动时不解析,真正请求时才查 DNS
        set $upstream_next "next:3000";
        proxy_pass http://$upstream_next;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 用户上传(Next 写,nginx 直读 volume 也可以,这里走代理简单)
    location /uploads/ {
        set $upstream_next "next:3000";
        proxy_pass http://$upstream_next;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Go 后端备用入口(默认不开,前端要用 Go 端时改路径前缀即可)
    # location /api/v2/ {
    #     set $upstream_go "go-server:8080";
    #     rewrite ^/api/v2/(.*)$ /api/$1 break;
    #     proxy_pass http://$upstream_go;
    # }

    # 默认 — 都走 Next
    location / {
        set $upstream_next "next:3000";
        proxy_pass http://$upstream_next;
    }
}
