######################################################################
# 肉友社 / RouYou — nginx 反代
#
# 路由策略:
#   /          -> Next.js (3000)            主站
#   /api/      -> Next.js (3000)            Next.js 自带的 /api 路由(默认)
#   /api/v2/   -> Go server (8080)          Go 后端可选第二实现(可选启用)
#   /uploads/  -> Next.js (3000)            用户上传文件
#
# SSE 透传:/api/sse/connect 长连接,关 buffering + 给 24h timeout
# Webhook:/api/payments/*/webhook 走默认转 Next
#
# 要走 Go 后端,把客户端请求改用 /api/v2/...,或在下游路由配置中切换
######################################################################

# 上游
upstream next_upstream {
    server next:3000;
    keepalive 32;
}
upstream go_upstream {
    server go-server:8080;
    keepalive 32;
}

# HTTP -> HTTPS(可选;若没配 cert,走 80 直接服务)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name plantcommunity.cn www.plantcommunity.cn;

    client_max_body_size 20M;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # 通用 proxy 缓冲(SSE 路径覆盖)
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;

    # SSE:必须关 buffering + 长连接
    location /api/sse/ {
        proxy_pass http://next_upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Go 后端备用入口(默认不开,前端要用 Go 端时改路径前缀即可)
    # location /api/v2/ {
    #     rewrite ^/api/v2/(.*)$ /api/$1 break;
    #     proxy_pass http://go_upstream;
    # }

    # 用户上传(Next 写,nginx 直读 volume 也可以,这里走代理简单)
    location /uploads/ {
        proxy_pass http://next_upstream;
        # 大文件下载/上传不要 buffer
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # 默认 — 都走 Next
    location / {
        proxy_pass http://next_upstream;
    }
}

