# =====================================================================
# 全栈 Docker Compose
# 启动:docker compose up -d --build
# 停止:docker compose down
# 重置数据:docker compose down -v
# =====================================================================

services:
  # -----------------------------------------------
  # MySQL 8(数据持久化在 mysql_data volume)
  # -----------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: rouyou-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-plants_community}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      - --max_connections=200
    volumes:
      # MySQL 数据落到宿主明确路径,避免被 docker volume prune 误删
      # 第一次创建时如果 ./data/mysql 不存在会自动建
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 5s
      timeout: 5s
      retries: 20
    # 可选:暴露端口给宿主调试。生产建议注释掉
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    networks:
      - rouyou

  # -----------------------------------------------
  # init:首次部署用 — `docker compose --profile init up init-db` 单独跑
  # -----------------------------------------------
  init-db:
    profiles: ["init"]
    image: node:20-alpine
    container_name: rouyou-init
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma:ro
      - ./scripts:/app/scripts:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./src/lib:/app/src/lib:ro
      - ./.env.docker:/app/.env:ro
    working_dir: /app
    environment:
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD:-root123456}@mysql:3306/${MYSQL_DATABASE:-plants_community}"
      TZ: Asia/Shanghai
    command: >
      sh -c "
      apk add --no-cache openssl &&
      npm config set registry https://registry.npmmirror.com &&
      npm ci --no-audit --prefer-offline &&
      npx prisma db push --skip-generate --accept-data-loss &&
      npx tsx prisma/seed.ts &&
      echo '✅ DB initialized'
      "
    restart: "no"
    networks:
      - rouyou

  # -----------------------------------------------
  # Next.js(端口 3000)
  # -----------------------------------------------
  next:
    build:
      context: .
      dockerfile: Dockerfile
    image: rouyou-next:local
    container_name: rouyou-next
    # 不让 docker 覆盖 HOSTNAME(我们要它当成 0.0.0.0 给 Next standalone)
    hostname: rouyou-next
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      # init-db 是首次启动用,以后只要 mysql healthy 就能启动 next
      # 第一次部署:先单独跑 init-db 完成 seed,后续 up 不再阻塞
    environment:
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD:-root123456}@mysql:3306/${MYSQL_DATABASE:-plants_community}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必须设置}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-rouyou_token}
      AUTH_COOKIE_MAX_AGE: ${AUTH_COOKIE_MAX_AGE:-2592000}
      # 支付(可选)
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-mock}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY_PEM: ${ALIPAY_PRIVATE_KEY_PEM:-}
      ALIPAY_PUBLIC_KEY_PEM: ${ALIPAY_PUBLIC_KEY_PEM:-}
      ALIPAY_GATEWAY: ${ALIPAY_GATEWAY:-}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
      ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL:-}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_MCHID: ${WECHAT_MCHID:-}
      WECHAT_SERIAL_NO: ${WECHAT_SERIAL_NO:-}
      WECHAT_PRIVATE_KEY_PEM: ${WECHAT_PRIVATE_KEY_PEM:-}
      WECHAT_API_V3_KEY: ${WECHAT_API_V3_KEY:-}
      WECHAT_NOTIFY_URL: ${WECHAT_NOTIFY_URL:-}
      # 微信登录(网站应用 PC 扫码)
      WECHAT_LOGIN_APP_ID: ${WECHAT_LOGIN_APP_ID:-}
      WECHAT_LOGIN_APP_SECRET: ${WECHAT_LOGIN_APP_SECRET:-}
      WECHAT_LOGIN_REDIRECT_URI: ${WECHAT_LOGIN_REDIRECT_URI:-}
      # 微信登录(公众号网页授权 H5)
      WECHAT_MP_APP_ID: ${WECHAT_MP_APP_ID:-}
      WECHAT_MP_APP_SECRET: ${WECHAT_MP_APP_SECRET:-}
      WECHAT_MP_REDIRECT_URI: ${WECHAT_MP_REDIRECT_URI:-}
      # 邮箱验证码登录(SMTP)
      OTP_DRIVER: ${OTP_DRIVER:-mock}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-肉友社}
      # 上传存储 driver:local(默认)| qiniu
      UPLOAD_DRIVER: ${UPLOAD_DRIVER:-local}
      QINIU_ACCESS_KEY: ${QINIU_ACCESS_KEY:-}
      QINIU_SECRET_KEY: ${QINIU_SECRET_KEY:-}
      QINIU_BUCKET: ${QINIU_BUCKET:-}
      QINIU_DOMAIN: ${QINIU_DOMAIN:-}
      QINIU_REGION: ${QINIU_REGION:-z0}
      # 帖子审核开关(同步 schema 后开)
      REVIEW_FILTER_ENABLED: ${REVIEW_FILTER_ENABLED:-0}
      # 时区:让 SSR 渲染的本地时间是北京时间(默认容器内是 UTC)
      TZ: Asia/Shanghai
      # 强制 Next standalone 绑 0.0.0.0(否则 Docker 把 HOSTNAME 覆盖成容器 ID)
      HOSTNAME: "0.0.0.0"
    # 把 3000 暴露到宿主 127.0.0.1(因为 nginx 走 host 网络,要用宿主回环访问)
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # 用户上传文件:Next.js 写入本地路径,落宿主目录持久化
      - ./data/uploads:/app/public/uploads
      # 大文件上传分片临时目录(/api/upload/chunk 写,/finish 合并后清理)
      - ./data/upload-chunks:/app/data/upload-chunks
    healthcheck:
      # Next standalone 在容器里把 HOSTNAME 重置成 docker 容器 ID + 绑定该 IP,
      # 127.0.0.1 反而连不上;改用 0.0.0.0 探所有接口的任一回应
      test:
        - "CMD-SHELL"
        - |
          node -e "require('net').createConnection(3000, '0.0.0.0').once('connect', function() { this.end(); process.exit(0); }).once('error', function() { process.exit(1); })"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rouyou

  # -----------------------------------------------
  # Go 后端(端口 8080)
  # -----------------------------------------------
  go-server:
    build:
      context: ./server-go
      dockerfile: Dockerfile
    image: rouyou-go:local
    container_name: rouyou-go
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD:-root123456}@mysql:3306/${MYSQL_DATABASE:-plants_community}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必须设置}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-rouyou_token}
      AUTH_COOKIE_MAX_AGE: ${AUTH_COOKIE_MAX_AGE:-2592000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      TZ: Asia/Shanghai
    healthcheck:
      # alpine 自带 wget(BusyBox 版),用 -O- 拿响应
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - rouyou

  # -----------------------------------------------
  # Nginx 反代(可选 — 如果宿主已有 nginx/宝塔/Caddy,可以不启)
  # 启动:docker compose --profile nginx up -d nginx
  # 用 host 网络模式 — 直接占宿主机端口,绕过 docker-proxy
  # -----------------------------------------------
  nginx:
    profiles: ["nginx"]
    image: nginx:1.27-alpine
    container_name: rouyou-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      next:
        condition: service_started
      go-server:
        condition: service_started

# 注:不再使用 docker volume,数据全部落宿主目录:
#   - ./data/mysql       MySQL 数据
#   - ./data/uploads     用户上传文件
#   - ./data/upload-chunks 大文件分片临时目录(运行时由 Next 创建)
# 这样可以避免 `docker volume prune` 时数据被误删

networks:
  rouyou:
    driver: bridge
